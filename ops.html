<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ops — Ovae</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    .order { background:#fff; border:1px solid var(--hairline); border-radius:16px; padding:18px 20px; margin-top:14px; }
    .order .top { display:flex; justify-content:space-between; align-items:baseline; gap:10px; flex-wrap:wrap; }
    .status { font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:4px 10px; border-radius:999px; }
    .s-pending, .s-confirmed { background:#F6E7EC; color:#8A2C4F; }
    .s-preparing { background:#FDF3E0; color:#8A6420; }
    .s-out_for_delivery { background:#ECF1FB; color:#2C4E9E; }
    .s-delivered { background:#EFF4E9; color:#3B6D11; }
    .s-cancelled { background:#F0EBE8; color:#7A6A70; }
    .items { margin-top:10px; font-size:14px; color:var(--ink); }
    .meta { margin-top:8px; font-size:13px; color:var(--ink-soft); line-height:1.5; }
    .btns { margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; }
    .btns button {
      font:inherit; font-size:13px; font-weight:600; padding:9px 14px; border-radius:999px;
      border:1.5px solid var(--rose); background:transparent; color:var(--rose); cursor:pointer;
    }
    .btns button.primary { background:var(--rose); color:#fff; border:0; }
    .btns button:disabled { opacity:.4; cursor:default; }
    .field { width:100%; box-sizing:border-box; height:48px; border:1.5px solid var(--hairline); border-radius:12px; padding:0 14px; font:inherit; margin-top:10px; background:#fff; }
    #err { color:var(--rose); font-size:14px; margin-top:10px; min-height:1em; }
    .alert { background:#FDF0EF; border:1px solid #E8B4B1; border-radius:16px; padding:14px 18px; margin-top:10px; }
    .alert .kind { font-size:12px; font-weight:700; letter-spacing:.06em; color:#B23230; }
    .alert .det { font-size:12.5px; color:var(--ink-soft); margin-top:6px; word-break:break-all; }
    .cost { display:flex; gap:8px; align-items:center; margin-top:10px; }
    .cost input { width:110px; height:36px; border:1.5px solid var(--hairline); border-radius:10px; padding:0 10px; font:inherit; }
    .cost button { font:inherit; font-size:12.5px; font-weight:600; padding:8px 12px; border-radius:999px; border:1.5px solid var(--hairline); background:#fff; cursor:pointer; }
  </style>
</head>
<body>

<header class="site">
  <div class="wrap"><a href="/" aria-label="Ovae home"><img class="mark" src="wordmark.svg" alt="ovae"></a></div>
</header>

<main class="doc">
  <div class="wrap" id="card" style="max-width:560px;">
    <h1 style="font-size:28px;font-weight:300;">Ops.</h1>
    <p class="updated">Orders, with buttons. No table surgery.</p>
    <div id="app"><p class="updated" style="margin-top:20px;">Loading…</p></div>
  </div>
</main>

<footer class="site">
  <div class="wrap"><span>© 2026 Ovae Health, Inc.</span><span>Ops only — everyone else gets a polite 403.</span></div>
</footer>

<script>
  const SB_URL = 'https://wftnynwtesdtuuteugib.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmdG55bnd0ZXNkdHV1dGV1Z2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMjI5NzMsImV4cCI6MjA5ODU5ODk3M30.-MJ2uuBJsyAvhHCpe2XWfAE7K6GhzXPkHCfFcEADZEM';
  const app = document.getElementById('app');
  const esc = (x) => String(x == null ? '' : x).replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  const NEXT = {
    pending:          [['preparing','Start preparing'],['out_for_delivery','On its way'],['delivered','Delivered']],
    confirmed:        [['preparing','Start preparing'],['out_for_delivery','On its way'],['delivered','Delivered']],
    preparing:        [['out_for_delivery','On its way'],['delivered','Delivered']],
    out_for_delivery: [['delivered','Delivered']],
    delivered:        [],
    cancelled:        [],
  };
  const NICE = { pending:'New', confirmed:'New', preparing:'Preparing', out_for_delivery:'On its way', delivered:'Delivered', cancelled:'Cancelled' };

  let jwt = sessionStorage.getItem('ops_jwt');

  function signInUI() {
    app.innerHTML =
      '<p class="updated" style="margin-top:20px;">Sign in with your ops email.</p>' +
      '<input class="field" id="email" type="email" placeholder="you@ovae.health">' +
      '<button class="badge" id="send" style="border:0;cursor:pointer;margin-top:12px;width:100%;">Email me a code</button>' +
      '<div id="err"></div>';
    document.getElementById('send').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      const r = await fetch(SB_URL + '/auth/v1/otp', { method:'POST', headers:{ apikey:SB_KEY, 'Content-Type':'application/json' }, body: JSON.stringify({ email, create_user:false }) });
      if (!r.ok) { document.getElementById('err').textContent = 'Could not send the code.'; return; }
      app.innerHTML =
        '<p class="updated" style="margin-top:20px;">Code sent to ' + esc(email) + '.</p>' +
        '<input class="field" id="code" inputmode="numeric" placeholder="6-digit code">' +
        '<button class="badge" id="verify" style="border:0;cursor:pointer;margin-top:12px;width:100%;">Open ops</button>' +
        '<div id="err"></div>';
      document.getElementById('verify').onclick = async () => {
        const code = document.getElementById('code').value.trim();
        const v = await fetch(SB_URL + '/auth/v1/verify', { method:'POST', headers:{ apikey:SB_KEY, 'Content-Type':'application/json' }, body: JSON.stringify({ type:'email', email, token: code }) });
        const d = await v.json().catch(() => ({}));
        if (!v.ok || !d.access_token) { document.getElementById('err').textContent = 'That code didn\'t work.'; return; }
        jwt = d.access_token;
        sessionStorage.setItem('ops_jwt', jwt);
        load();
      };
    };
  }

  async function call(body) {
    const r = await fetch(SB_URL + '/functions/v1/ops-orders', {
      method: 'POST',
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + jwt, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (r.status === 401 || r.status === 403) { sessionStorage.removeItem('ops_jwt'); jwt = null; signInUI(); throw new Error('auth'); }
    return r.json();
  }

  function itemsLine(items) {
    if (!Array.isArray(items)) return '';
    return items.map((it) => `${it.qty} × ${esc(it.name ?? it.product_id)}`).join('<br>');
  }

  function when(t) {
    return new Date(t).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
  }
  function money(c) { return '$' + (Number(c) / 100).toFixed(2); }

  // A simple fulfillment card for the non-order queues (send/cover/giftlink/
  // credit): show what + to whom + when, one "Mark done" button.
  function queueCard(kind, id, title, subtitle, meta) {
    return `<div class="order">
      <div class="top"><strong>${esc(title)}</strong><span class="status s-preparing">To fulfill</span></div>
      ${subtitle ? `<div class="items">${esc(subtitle)}</div>` : ''}
      <div class="meta">${esc(meta)}</div>
      <div class="btns"><button class="primary" data-kind="${esc(kind)}" data-fid="${esc(id)}">Mark done</button></div>
    </div>`;
  }

  function section(title, html) {
    return html ? `<h2 style="font-size:15px;margin-top:28px;color:var(--ink);">${title}</h2>${html}` : '';
  }

  async function load() {
    app.innerHTML = '<p class="updated" style="margin-top:20px;">Loading…</p>';
    let d, st;
    try { d = await call({ action: 'queues' }); } catch { return; }
    try { st = await call({ action: 'stats' }); } catch { st = null; }

    const scoreHtml = st && st.now ? `<div class="order">
      <div class="top"><strong>Scoreboard</strong><span class="status s-delivered">live</span></div>
      <div class="items">Accounts: <strong>${st.now.women ?? 0}</strong> · Active links: <strong>${st.now.linksActive ?? 0}</strong> · Paying partners: <strong>${st.now.paying ?? 0}</strong></div>
      ${(st.days || []).length ? `<div class="meta" style="overflow-x:auto;"><table style="border-collapse:collapse;font-size:12px;">
        <tr><th style="text-align:left;padding:2px 8px 2px 0;">day</th><th style="text-align:right;padding:2px 8px;">signups</th><th style="text-align:right;padding:2px 8px;">actives</th><th style="text-align:right;padding:2px 8px;">D1</th><th style="text-align:right;padding:2px 8px;">D7</th><th style="text-align:right;padding:2px 8px;">orders</th><th style="text-align:right;padding:2px 8px;">gift joins</th></tr>
        ${(st.days || []).slice(0, 7).map((r) => `<tr><td style="padding:2px 8px 2px 0;">${esc(String(r.day).slice(0, 10))}</td><td style="text-align:right;padding:2px 8px;">${r.signups}</td><td style="text-align:right;padding:2px 8px;">${r.actives}</td><td style="text-align:right;padding:2px 8px;">${r.d1_cohort ? r.d1_retained + '/' + r.d1_cohort : '—'}</td><td style="text-align:right;padding:2px 8px;">${r.d7_cohort ? r.d7_retained + '/' + r.d7_cohort : '—'}</td><td style="text-align:right;padding:2px 8px;">${r.orders_total}</td><td style="text-align:right;padding:2px 8px;">${r.gift_joins ?? 0}</td></tr>`).join('')}
      </table></div>` : '<div class="meta">Daily rollups appear here each morning.</div>'}
    </div>` : '';

    if (!d || !d.orders) { app.innerHTML = '<p class="updated" style="margin-top:20px;">Could not load the queues.</p>'; return; }

    const alertHtml = (d.alerts || []).map((a) => `<div class="alert">
      <div class="kind">⚠ ${esc(a.kind)} · ${when(a.created_at)}</div>
      <div class="det">${esc(JSON.stringify(a.detail))}</div>
      <div class="btns"><button data-alert="${esc(a.id)}">Resolved</button></div>
    </div>`).join('');

    const orderHtml = (d.orders || []).map((o) => {
      const addr = o.address ? `${esc(o.address.label)} — ${esc(o.address.line1)}${o.address.line2 ? ', ' + esc(o.address.line2) : ''}, ${esc(o.address.city)}, ${esc(o.address.state)} ${esc(o.address.zip)}` : 'No address — confirm with her';
      return `<div class="order">
        <div class="top"><strong>${o.for ? esc(o.for) + ' · ' : ''}$${Number(o.total).toFixed(2)}</strong><span class="status s-${esc(o.status)}">${NICE[o.status] ?? esc(o.status)}</span></div>
        <div class="items">${itemsLine(o.items)}</div>
        <div class="meta">${when(o.createdAt)}${o.requestedDate ? ' · requested for ' + esc(o.requestedDate) : ''}<br>${addr}${o.note ? '<br>“' + esc(o.note) + '”' : ''}</div>
        <div class="btns">${(NEXT[o.status] ?? []).map(([st, label], i) => `<button class="${i === 0 ? 'primary' : ''}" data-id="${esc(o.id)}" data-st="${esc(st)}">${label}</button>`).join('')}</div>
        <div class="cost"><input inputmode="decimal" placeholder="cost $" data-costfor="${esc(o.id)}"><button data-savecost="${esc(o.id)}">Save cost</button><span style="font-size:12px;color:var(--ink-soft);">what it actually cost you</span></div>
      </div>`;
    }).join('');

    const sendHtml = (d.sends || []).map((r) =>
      queueCard('send', r.id, `Send to ${r.to}`, r.note ? `“${r.note}”` : '', `${r.category || 'gift'} · ${when(r.createdAt)} · ${r.address ? 'deliver to: ' + r.address : 'no saved address — reach her directly'}`)).join('');
    const coverHtml = (d.covers || []).map((r) =>
      queueCard('cover', r.id, r.label, money(r.amountCents) + ' · covered', `${when(r.createdAt)} · ${r.address ? 'deliver to: ' + r.address : 'no saved address — reach her directly'}`)).join('');
    const giftHtml = (d.giftLinks || []).map((r) =>
      queueCard('giftlink', r.id, r.label, `for ${r.to}`,
        `accepted ${when(r.claimedAt)} · ${r.address ? 'deliver to: ' + r.address : 'no address on file — reach her directly'}`)).join('');
    const creditHtml = (d.credits || []).map((r) =>
      queueCard('credit', r.id, r.label, `for ${r.to}`, `redeemed ${when(r.redeemedAt)} · ${r.address ? 'deliver to: ' + r.address : 'no saved address — reach her directly'}`)).join('');

    // Boxes are standing subscriptions, not one-shot tasks: no Mark-done —
    // each cycle is a confirm-timing-then-arrange conversation.
    const boxHtml = (d.boxes || []).map((r) => `<div class="order">
      <div class="top"><strong>${esc(r.to)}'s box</strong><span class="status s-preparing">Standing</span></div>
      <div class="items">${esc(String(r.itemCount))} items</div>
      <div class="meta">aiming ${r.nextDelivery ? esc(r.nextDelivery) : 'next cycle'} (her app's estimate — cycle moves, CONFIRM with her before arranging)</div>
    </div>`).join('');

    const total = (d.orders||[]).length + (d.sends||[]).length + (d.covers||[]).length + (d.giftLinks||[]).length + (d.credits||[]).length + (d.boxes||[]).length;
    if (total === 0) {
      app.innerHTML =
        section('Scoreboard — counted, never tracked', scoreHtml) +
        section('⚠ Money alarms', alertHtml) +
        '<p class="updated" style="margin-top:20px;">Nothing to fulfill right now. New orders, gifts, and covers land here.</p>';
      // Alert resolve buttons still need wiring in this branch.
      app.querySelectorAll('button[data-alert]').forEach((b) => {
        b.onclick = async () => { b.disabled = true; try { await call({ action:'resolve', id: b.dataset.alert }); } catch { return; } load(); };
      });
      return;
    }


    app.innerHTML =
      section('Scoreboard — counted, never tracked', scoreHtml) +
      section('⚠ Money alarms', alertHtml) +
      section('Orders', orderHtml) +
      section('Ovae Send — gifts to her', sendHtml) +
      section('Covered — someone paid for her', coverHtml) +
      section('Gift links — accepted', giftHtml) +
      section('Gift credits — redeemed', creditHtml) +
      section('Period boxes — standing', boxHtml);

    // Order stage buttons.
    app.querySelectorAll('button[data-id]').forEach((b) => {
      b.onclick = async () => {
        b.disabled = true;
        try { await call({ action:'advance', id: b.dataset.id, status: b.dataset.st }); } catch { return; }
        load();
      };
    });
    // Alert resolve buttons.
    app.querySelectorAll('button[data-alert]').forEach((b) => {
      b.onclick = async () => {
        b.disabled = true;
        try { await call({ action:'resolve', id: b.dataset.alert }); } catch { return; }
        load();
      };
    });
    // Landed-cost save (dollars in, cents stored).
    app.querySelectorAll('button[data-savecost]').forEach((b) => {
      b.onclick = async () => {
        const input = app.querySelector(`input[data-costfor="${b.dataset.savecost}"]`);
        const dollars = parseFloat(input.value);
        if (!isFinite(dollars) || dollars < 0) { input.value = ''; return; }
        b.disabled = true; b.textContent = 'Saved';
        try { await call({ action:'cost', id: b.dataset.savecost, cents: Math.round(dollars * 100) }); } catch { return; }
        setTimeout(() => { b.disabled = false; b.textContent = 'Save cost'; }, 1200);
      };
    });
    // Queue "Mark done" buttons.
    app.querySelectorAll('button[data-fid]').forEach((b) => {
      b.onclick = async () => {
        b.disabled = true;
        try { await call({ action:'fulfill', kind: b.dataset.kind, id: b.dataset.fid }); } catch { return; }
        load();
      };
    });
  }

  if (jwt) load(); else signInUI();
</script>

</body>
</html>
