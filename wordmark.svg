<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 458 106" width="458" height="106" role="img" aria-label="ovae">
  <!--
    ovae wordmark · light backgrounds · #B5476E
    Custom letterforms, drawn as paths (no font dependency).
    The ova signature: the o's counter is raised 4 units, so the ring is
    20 units thick at the bottom, 16 at the sides, 12 at the top — the egg
    sits low. Subtle at a glance, discoverable up close.
    x-height 100, overshoot 3 (rounds span y 0–106, flats y 3–103).
    Minimum reproduction width: 80px. Clear space: 106 units (the o's height).
  -->
  <g fill="#B5476E">
    <!-- o : outer ring center (54,53) r 54×53 · counter center (54,49) r 38×37 -->
    <path d="M 0,53 A 54,53 0 1 1 108,53 A 54,53 0 1 1 0,53 Z
             M 16,49 A 38,37 0 1 0 92,49 A 38,37 0 1 0 16,49 Z"/>
    <!-- v : diagonal strokes, flat 18-unit base -->
    <path d="M 116,3 L 133.5,3 L 166,80.5 L 198.5,3 L 216,3 L 175,103 L 157,103 Z"/>
    <!-- a : single-story — the bowl echoes the o, stem merges at right -->
    <path d="M 224,53 A 52,53 0 1 1 328,53 A 52,53 0 1 1 224,53 Z
             M 318,3 L 334,3 L 334,103 L 318,103 Z
             M 240,53 A 36,37.5 0 1 0 312,53 A 36,37.5 0 1 0 240,53 Z"/>
    <!-- e : horizontal-cut aperture, bar y 46–60, opening 60–73 -->
    <path fill-rule="evenodd"
          d="M 403,0 A 55,53 0 0 1 457.5,60 L 365.2,60 A 38.5,37.5 0 0 0 437.8,73 L 453.9,73 A 55,53 0 1 1 403,0 Z
             M 365.2,46 A 38.5,37.5 0 0 1 440.8,46 Z"/>
  </g>
</svg>
