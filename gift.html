<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A gift for you — Ovae</title>
  <meta name="robots" content="noindex">
  <!-- Apple Smart App Banner: shows "Open in the Ovae app" at the top on iOS. -->
  <meta name="apple-itunes-app" content="app-id=6787230141">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    .giftcard {
      margin-top: 24px; background: #fff; border: 1px solid var(--hairline);
      border-radius: 18px; padding: 24px;
    }
    .giftcard .eyebrow { font-size: 13px; color: var(--rose); text-transform: uppercase; letter-spacing: 0.1em; }
    .giftcard .name { margin-top: 8px; font-size: 24px; font-weight: 300; color: var(--ink); }
    .giftcard .note { margin-top: 14px; font-style: italic; color: var(--ink-soft); line-height: 1.5; }
    .field {
      margin-top: 12px; width: 100%; box-sizing: border-box; height: 48px;
      border: 1.5px solid var(--hairline); border-radius: 12px; padding: 0 14px;
      font: inherit; color: var(--ink); background: #fff;
    }
    .field:focus { outline: none; border-color: var(--rose); }
    .linkrow {
      margin-top: 16px; display: flex; gap: 8px; align-items: stretch;
    }
    .linkrow input { flex: 1; font-size: 13px; color: var(--ink-soft); }
    .mini { font-size: 13px; color: var(--ink-soft); margin-top: 12px; }
    #err { margin-top: 12px; color: var(--rose); font-size: 14px; min-height: 1em; }
    .ghost {
      background: transparent; color: var(--rose); border: 1.5px solid var(--rose);
      border-radius: 999px; padding: 12px 18px; cursor: pointer; font: inherit; font-weight: 600;
    }
    /* main.doc a colours links rose; our filled badge links need white text. */
    main.doc a.badge { color: #fff; }
    /* The unwrap — Kakao's moment, Ovae's way. */
    #unwrap {
      position: fixed; inset: 0; z-index: 40; border: 0; width: 100%;
      background: rgba(42, 17, 32, 0.55); cursor: pointer; font: inherit;
      display: flex; align-items: center; justify-content: center; padding: 32px;
      opacity: 0; transition: opacity 0.4s ease;
    }
    #unwrap.in { opacity: 1; }
    #unwrap.out { opacity: 0; }
    .parcelcard {
      background: #fff; border-radius: 18px; padding: 36px 28px; max-width: 340px; width: 100%;
      text-align: center; box-shadow: 0 12px 40px rgba(90, 40, 60, 0.25);
      transform: translateY(14px); transition: transform 0.4s ease;
    }
    #unwrap.in .parcelcard { transform: translateY(0); }
    .parcel { display: inline-block; animation: parcelwiggle 2.4s ease-in-out infinite; }
    @keyframes parcelwiggle {
      0%, 55%, 100% { transform: rotate(0deg); }
      65% { transform: rotate(-5deg); }
      80% { transform: rotate(5deg); }
      90% { transform: rotate(-2deg); }
    }
    .parcelcard h2 { margin: 18px 0 0; font-size: 24px; font-weight: 300; color: var(--ink); }
    .parcelcard .tap { margin-top: 14px; font-size: 14px; color: var(--rose); letter-spacing: 0.04em; }
    @media (prefers-reduced-motion: reduce) {
      #unwrap, .parcelcard { transition: none; }
      .parcel { animation: none; }
    }
  </style>
</head>
<body>

<header class="site">
  <div class="wrap">
    <a href="/" aria-label="Ovae home"><img class="mark" src="wordmark.svg" alt="ovae"></a>
  </div>
</header>

<main class="doc">
  <div class="wrap" id="card" style="max-width:460px;">
    <p id="status" class="updated">Loading…</p>
  </div>
</main>

<footer class="site">
  <div class="wrap">
    <span>© 2026 Ovae Health, Inc.</span>
    <a href="privacy.html">Privacy</a>
    <span id="foot">Nothing ships until you accept it. The sender never sees your address.</span>
  </div>
</footer>

<script>
  const SB_URL = 'https://wftnynwtesdtuuteugib.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmdG55bnd0ZXNkdHV1dGV1Z2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMjI5NzMsImV4cCI6MjA5ODU5ODk3M30.-MJ2uuBJsyAvhHCpe2XWfAE7K6GhzXPkHCfFcEADZEM';
  const APP_STORE = 'https://apps.apple.com/app/id6787230141';

  const card = document.getElementById('card');
  const params = new URLSearchParams(location.search);
  const token = params.get('token');

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

  // ── Sender's post-payment view: give them the link + a pre-filled text ──────
  function renderSenderShare() {
    const shareUrl = 'https://ovae.health/gift.html?token=' + encodeURIComponent(token);
    const sms = 'sms:?&body=' + encodeURIComponent('I sent you something on Ovae — open it here: ' + shareUrl);
    document.getElementById('foot').textContent = 'She chooses when it arrives. You never see her address.';
    card.innerHTML =
      '<h1 style="font-size:28px;font-weight:300;">Paid. Now send it.</h1>' +
      '<p style="margin-top:14px;color:var(--ink-soft);">Text her this link. She opens it and accepts — and picks when it arrives. She never sees what you paid.</p>' +
      '<div class="linkrow">' +
        '<input class="field" id="share" readonly value="' + esc(shareUrl) + '">' +
        '<button class="ghost" id="copy" type="button">Copy</button>' +
      '</div>' +
      '<a class="badge" style="margin-top:16px;width:100%;box-sizing:border-box;text-align:center;" href="' + esc(sms) + '">Text it now</a>' +
      '<p class="mini" style="text-align:center;">The link works for 90 days.</p>';
    document.getElementById('copy').addEventListener('click', function () {
      const inp = document.getElementById('share');
      inp.select();
      navigator.clipboard && navigator.clipboard.writeText(inp.value);
      this.textContent = 'Copied';
    });
  }

  // ── The unwrap ceremony: parcel first, her tap opens it ────────────────────
  function showUnwrap() {
    var b = document.createElement('button');
    b.id = 'unwrap';
    b.type = 'button';
    b.setAttribute('aria-label', 'Something arrived for you. Tap to open.');
    b.innerHTML =
      '<span class="parcelcard">' +
        '<span class="parcel"><svg viewBox="0 0 12 12" width="96" height="96" shape-rendering="crispEdges" aria-hidden="true"><rect x="4" y="0" width="2" height="1" fill="#B5476E"/><rect x="7" y="0" width="2" height="1" fill="#B5476E"/><rect x="3" y="1" width="1" height="1" fill="#B5476E"/><rect x="6" y="1" width="1" height="1" fill="#B5476E"/><rect x="9" y="1" width="1" height="1" fill="#B5476E"/><rect x="4" y="2" width="5" height="1" fill="#B5476E"/><rect x="2" y="3" width="4" height="1" fill="#F6C6D4"/><rect x="6" y="3" width="1" height="1" fill="#B5476E"/><rect x="7" y="3" width="4" height="1" fill="#F6C6D4"/><rect x="2" y="4" width="1" height="1" fill="#F6C6D4"/><rect x="3" y="4" width="1" height="1" fill="#FFFFFF"/><rect x="4" y="4" width="2" height="1" fill="#F6C6D4"/><rect x="6" y="4" width="1" height="1" fill="#B5476E"/><rect x="7" y="4" width="4" height="1" fill="#F6C6D4"/><rect x="2" y="5" width="4" height="1" fill="#F6C6D4"/><rect x="6" y="5" width="1" height="1" fill="#B5476E"/><rect x="7" y="5" width="4" height="1" fill="#F6C6D4"/><rect x="2" y="6" width="9" height="1" fill="#B5476E"/><rect x="2" y="7" width="4" height="1" fill="#F6C6D4"/><rect x="6" y="7" width="1" height="1" fill="#B5476E"/><rect x="7" y="7" width="4" height="1" fill="#F6C6D4"/><rect x="2" y="8" width="4" height="1" fill="#F6C6D4"/><rect x="6" y="8" width="1" height="1" fill="#B5476E"/><rect x="7" y="8" width="4" height="1" fill="#F6C6D4"/><rect x="2" y="9" width="3" height="1" fill="#E79FB5"/><rect x="5" y="9" width="1" height="1" fill="#F6C6D4"/><rect x="6" y="9" width="1" height="1" fill="#B5476E"/><rect x="7" y="9" width="1" height="1" fill="#F6C6D4"/><rect x="8" y="9" width="3" height="1" fill="#E79FB5"/><rect x="2" y="10" width="3" height="1" fill="#E79FB5"/><rect x="5" y="10" width="1" height="1" fill="#F6C6D4"/><rect x="6" y="10" width="1" height="1" fill="#B5476E"/><rect x="7" y="10" width="1" height="1" fill="#F6C6D4"/><rect x="8" y="10" width="3" height="1" fill="#E79FB5"/></svg></span>' +
        '<h2>Something arrived for you</h2>' +
        '<span class="tap">Tap to open</span>' +
      '</span>';
    document.body.appendChild(b);
    requestAnimationFrame(function () { b.classList.add('in'); });
    b.addEventListener('click', function () {
      b.classList.remove('in');
      b.classList.add('out');
      setTimeout(function () { b.remove(); }, 420);
    }, { once: true });
  }

  // ── Recipient's claim view ──────────────────────────────────────────────────
  function renderClaim(gift) {
    showUnwrap();
    const openApp = 'ovae://gift?token=' + encodeURIComponent(token);
    card.innerHTML =
      '<div class="giftcard">' +
        '<div class="eyebrow">Someone sent you</div>' +
        '<div class="name">' + esc(gift.display_label || 'a little something') + '</div>' +
        (gift.note ? '<div class="note">“' + esc(gift.note) + '”</div>' : '') +
      '</div>' +
      '<a class="badge" id="openapp" style="margin-top:20px;width:100%;box-sizing:border-box;text-align:center;" href="' + esc(openApp) + '">Open in Ovae to accept it</a>' +
      '<p class="mini" style="text-align:center;">Accept in the app and keep it for the day you want it — plus your cycle companion, free, forever.</p>' +
      '<button class="ghost" id="webclaim" type="button" style="margin-top:18px;width:100%;">No app? Accept it here</button>' +
      '<div id="webbox"></div>';

    // "Open in Ovae": try the app; if we're still here ~1.4s later, the app
    // isn't installed — send them to the App Store.
    document.getElementById('openapp').addEventListener('click', function (e) {
      let hidden = false;
      const onHide = () => { hidden = true; };
      document.addEventListener('visibilitychange', onHide, { once: true });
      window.addEventListener('pagehide', onHide, { once: true });
      setTimeout(() => {
        document.removeEventListener('visibilitychange', onHide);
        if (!hidden) location.href = APP_STORE;
      }, 1400);
    });

    document.getElementById('webclaim').addEventListener('click', renderWebClaim);
  }

  // Web claim: prove it's HER with an email code, THEN claim. This is the
  // consent gate — only an authenticated recipient can accept, so a sender
  // who holds the token cannot direct the gift anywhere.
  function renderWebClaim() {
    const box = document.getElementById('webbox');
    box.innerHTML =
      '<p class="mini">Accepting without the app takes a quick email code — that\'s how we make sure only you can accept it.</p>' +
      '<input class="field" id="email" type="email" inputmode="email" placeholder="your email" autocomplete="email">' +
      '<button class="badge" id="sendcode" type="button" style="margin-top:12px;width:100%;box-sizing:border-box;border:0;">Email me a code</button>' +
      '<div id="err"></div>';
    document.getElementById('sendcode').addEventListener('click', requestCode);
  }

  function requestCode() {
    const email = document.getElementById('email').value.trim();
    const err = document.getElementById('err');
    if (!email || email.indexOf('@') < 0) { err.textContent = 'Enter a valid email.'; return; }
    const btn = document.getElementById('sendcode');
    btn.disabled = true; btn.textContent = 'Sending…';
    fetch(SB_URL + '/auth/v1/otp', {
      method: 'POST',
      headers: { apikey: SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, create_user: true }),
    })
      .then((r) => { if (!r.ok) throw new Error('otp ' + r.status); return r.json().catch(() => ({})); })
      .then(() => {
        const box = document.getElementById('webbox');
        box.innerHTML =
          '<p class="mini">Check ' + esc(email) + ' for a 6-digit code.</p>' +
          '<input class="field" id="code" inputmode="numeric" autocomplete="one-time-code" placeholder="6-digit code">' +
          '<button class="badge" id="verify" type="button" style="margin-top:12px;width:100%;box-sizing:border-box;border:0;">Accept my gift</button>' +
          '<div id="err"></div>';
        document.getElementById('verify').addEventListener('click', () => verifyAndClaim(email));
      })
      .catch(() => { btn.disabled = false; btn.textContent = 'Email me a code'; document.getElementById('err').textContent = 'Couldn\'t send the code — try again.'; });
  }

  function verifyAndClaim(email) {
    const code = document.getElementById('code').value.trim();
    const err = document.getElementById('err');
    if (!code) { err.textContent = 'Enter the code from your email.'; return; }
    const btn = document.getElementById('verify');
    btn.disabled = true; btn.textContent = 'One sec…';
    fetch(SB_URL + '/auth/v1/verify', {
      method: 'POST',
      headers: { apikey: SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'email', email: email, token: code }),
    })
      .then((r) => { if (!r.ok) throw new Error('verify ' + r.status); return r.json(); })
      .then((auth) => {
        const jwt = auth && auth.access_token;
        const uid = auth && auth.user && auth.user.id;
        if (!jwt || !uid) throw new Error('no session');
        renderAddress(jwt, uid);
      })
      .catch(() => { btn.disabled = false; btn.textContent = 'Accept my gift'; document.getElementById('err').textContent = 'That didn\'t work — check the code and try again.'; });
  }

  // ── Where should it go? ─────────────────────────────────────────────────────
  // The destination is demanded from HER, the authenticated recipient — never
  // the sender — and it binds in the SAME server call as the claim, so a paid
  // gift can never sit in the queue with nowhere to go. The address is
  // sanity-checked right here in the page (structure + ZIP↔state) and never
  // sent to any third-party validator. Table mirrors the app's addressCheck.
  const ZIP_RANGES = {AL:[[35000,36999]],AK:[[99500,99999]],AZ:[[85000,86599]],AR:[[71600,72999],[75502,75502]],CA:[[90000,96199]],CO:[[80000,81699]],CT:[[6000,6999],[6390,6390]],DE:[[19700,19999]],DC:[[20000,20599],[56900,56999]],FL:[[32000,34999]],GA:[[30000,31999],[39800,39899]],HI:[[96700,96899]],ID:[[83200,83899]],IL:[[60000,62999]],IN:[[46000,47999]],IA:[[50000,52899]],KS:[[66000,67999]],KY:[[40000,42799]],LA:[[70000,71499]],ME:[[3900,4999]],MD:[[20600,21999]],MA:[[1000,2799],[5501,5544]],MI:[[48000,49799]],MN:[[55000,56799]],MS:[[38600,39799]],MO:[[63000,65899]],MT:[[59000,59999]],NE:[[68000,69399]],NV:[[88900,89899]],NH:[[3000,3899]],NJ:[[7000,8999]],NM:[[87000,88499]],NY:[[10000,14999],[501,599],[6390,6390]],NC:[[27000,28999]],ND:[[58000,58899]],OH:[[43000,45999]],OK:[[73000,74999]],OR:[[97000,97999]],PA:[[15000,19699]],RI:[[2800,2999]],SC:[[29000,29999]],SD:[[57000,57799]],TN:[[37000,38599]],TX:[[75000,79999],[73301,73399],[88500,88599]],UT:[[84000,84799]],VT:[[5000,5999]],VA:[[22000,24699],[20100,20199]],WA:[[98000,99499]],WV:[[24700,26899]],WI:[[53000,54999]],WY:[[82000,83199],[83414,83414]],PR:[[600,799],[900,999]],VI:[[800,899]],GU:[[96910,96932]],AS:[[96799,96799]],MP:[[96950,96952]],FM:[[96941,96944]],MH:[[96960,96970]],PW:[[96939,96940]],AA:[[34000,34099]],AE:[[9000,9899]],AP:[[96200,96699]]};
  function checkAddr(line1, city, state, zip) {
    const st = state.trim().toUpperCase();
    if (!(st in ZIP_RANGES)) return { ok: false, msg: 'That state code doesn\u2019t exist \u2014 two letters, like CA.' };
    const zip5 = zip.trim().slice(0, 5);
    if (!/^\d{5}$/.test(zip5)) return { ok: false, msg: 'ZIP codes are five digits.' };
    const street = line1.trim();
    if (street.length < 4 || !/[a-zA-Z]/.test(street)) return { ok: false, msg: 'That street line looks incomplete.' };
    if (city.trim().length < 2) return { ok: false, msg: 'Which city?' };
    const z = parseInt(zip5, 10);
    const inState = ZIP_RANGES[st].some(function (r) { return z >= r[0] && z <= r[1]; });
    return inState ? { ok: true } : { ok: true, warn: true };
  }

  // Minted once per page — a retry after a network hiccup reuses the same
  // row (the upsert is idempotent by id) instead of depositing a twin.
  let mintedAddrId = null;
  let zipDoubt = false;

  function renderAddress(jwt, uid) {
    const box = document.getElementById('webbox');
    box.innerHTML =
      '<p class="mini" style="margin-top:14px;">Where should it go? Only we see this \u2014 never whoever sent it.</p>' +
      '<input class="field" id="a1" placeholder="Street address" autocomplete="address-line1">' +
      '<input class="field" id="a2" placeholder="Apt, unit (optional)" autocomplete="address-line2">' +
      '<div style="display:flex;gap:8px;">' +
        '<input class="field" id="city" placeholder="City" autocomplete="address-level2" style="flex:1;">' +
        '<input class="field" id="st" placeholder="ST" maxlength="2" autocomplete="address-level1" style="width:64px;text-transform:uppercase;">' +
        '<input class="field" id="zip" placeholder="ZIP" inputmode="numeric" maxlength="10" autocomplete="postal-code" style="width:96px;">' +
      '</div>' +
      '<button class="badge" id="accept" type="button" style="margin-top:12px;width:100%;box-sizing:border-box;border:0;">Accept \u2014 deliver here</button>' +
      '<div id="err"></div>';
    ['a1', 'city', 'st', 'zip'].forEach(function (id) {
      document.getElementById(id).addEventListener('input', function () { zipDoubt = false; document.getElementById('err').textContent = ''; });
    });
    document.getElementById('accept').addEventListener('click', function () { acceptWithAddress(jwt, uid); });
  }

  function acceptWithAddress(jwt, uid) {
    const err = document.getElementById('err');
    const a1 = document.getElementById('a1').value;
    const a2 = document.getElementById('a2').value.trim();
    const city = document.getElementById('city').value;
    const st = document.getElementById('st').value;
    const zip = document.getElementById('zip').value;
    const v = checkAddr(a1, city, st, zip);
    if (!v.ok) { err.textContent = v.msg; return; }
    if (v.warn && !zipDoubt) {
      zipDoubt = true;
      err.textContent = 'ZIP ' + zip.trim().slice(0, 5) + ' doesn\u2019t usually sit in ' + st.trim().toUpperCase() + ' \u2014 tap again if it\u2019s right.';
      return;
    }
    const btn = document.getElementById('accept');
    btn.disabled = true; btn.textContent = 'Accepting\u2026';
    if (!mintedAddrId) mintedAddrId = crypto.randomUUID();
    fetch(SB_URL + '/rest/v1/addresses?on_conflict=id', {
      method: 'POST',
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + jwt, 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates' },
      body: JSON.stringify({
        id: mintedAddrId, user_id: uid, label: 'Home',
        line1: a1.trim(), line2: a2 || null, city: city.trim(),
        state: st.trim().toUpperCase(), zip: zip.trim(), is_default: false,
      }),
    })
      .then((r) => { if (!r.ok) throw new Error('address ' + r.status); })
      .then(() => fetch(SB_URL + '/rest/v1/rpc/claim_gift_link', {
        method: 'POST',
        headers: { apikey: SB_KEY, Authorization: 'Bearer ' + jwt, 'Content-Type': 'application/json' },
        body: JSON.stringify({ p_token: token, p_address_id: mintedAddrId }),
      }))
      .then((r) => { if (!r.ok) throw new Error('claim ' + r.status); return r.json(); })
      .then((ok) => {
        if (ok !== true) throw new Error('not claimable');
        card.innerHTML =
          '<h1 style="font-size:28px;font-weight:300;">It\'s yours.</h1>' +
          '<p style="margin-top:14px;color:var(--ink-soft);">It\'ll come right to you. Nothing was shared with whoever sent it.</p>' +
          '<a class="badge" style="margin-top:20px;width:100%;box-sizing:border-box;text-align:center;" href="' + APP_STORE + '">Get Ovae — free, forever</a>' +
          '<p class="mini" style="text-align:center;">Your cycle companion, and every gift in one place.</p>';
      })
      .catch(() => { btn.disabled = false; btn.textContent = 'Accept \u2014 deliver here'; err.textContent = 'That didn\'t work \u2014 give it a moment and try again.'; });
  }

  // ── Route ───────────────────────────────────────────────────────────────────
  if (!token) {
    document.getElementById('status').textContent = 'This link is missing something. Ask for a fresh one.';
  } else if (params.get('sent') === '1') {
    renderSenderShare();
  } else {
    fetch(SB_URL + '/rest/v1/rpc/get_gift_link', {
      method: 'POST',
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ p_token: token }),
    })
      .then((r) => { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
      .then((rows) => {
        if (!Array.isArray(rows)) throw new Error('unexpected shape');
        const gift = rows[0];
        if (!gift) {
          card.innerHTML = '<h1 style="font-size:26px;font-weight:300;">This gift has expired.</h1><p style="margin-top:14px;color:var(--ink-soft);">Gift links last 90 days. Ask for a new one.</p>';
          return;
        }
        if (gift.status === 'pending') {
          card.innerHTML = '<h1 style="font-size:26px;font-weight:300;">Almost there.</h1><p style="margin-top:14px;color:var(--ink-soft);">This gift isn\'t quite ready yet. Check back in a few minutes.</p>';
          return;
        }
        if (gift.status === 'claimed' || gift.status === 'fulfilled') {
          card.innerHTML = '<h1 style="font-size:26px;font-weight:300;">Already accepted.</h1><p style="margin-top:14px;color:var(--ink-soft);">This one\'s taken care of — it\'s on its way.</p>';
          return;
        }
        renderClaim(gift); // status === 'paid'
      })
      .catch(() => {
        card.innerHTML = '<h1 style="font-size:26px;font-weight:300;">Couldn\'t load this gift.</h1><p style="margin-top:14px;color:var(--ink-soft);">Something hiccuped on our end. Refresh in a moment, or ask for a fresh link.</p>';
      });
  }
</script>

</body>
</html>
